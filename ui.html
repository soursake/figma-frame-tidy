<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    color: #333;
    background: #fff;
    padding: 16px;
  }

  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: #666;
    margin-bottom: 5px;
    letter-spacing: 0.01em;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  input[type=number] {
    flex: 1;
    border: 1px solid #e0e0e0;
    border-radius: 5px;
    padding: 7px 10px;
    font-size: 12px;
    font-family: inherit;
    color: #333;
    background: #fafafa;
    outline: none;
    -moz-appearance: textfield;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number]:focus {
    border-color: #0d99ff;
    background: #fff;
    box-shadow: 0 0 0 2px rgba(13,153,255,0.15);
  }

  .unit {
    font-size: 11px;
    color: #aaa;
    width: 16px;
    flex-shrink: 0;
  }

  .divider { height: 1px; background: #f0f0f0; margin: 14px 0; }

  button {
    width: 100%;
    padding: 9px;
    background: #0d99ff;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.12s;
  }
  button:hover  { background: #0882d8; }
  button:active { background: #076bb5; }

  #status {
    margin-top: 11px;
    font-size: 11px;
    color: #aaa;
    text-align: center;
    min-height: 15px;
    transition: color 0.2s;
  }
  #status.ok  { color: #1bc47d; }
  #status.err { color: #f05; }
</style>
</head>
<body>

<div class="field">
  <label>Frame spacing</label>
  <div class="row">
    <input type="number" id="frameGap" value="40" min="0" max="500">
    <span class="unit">px</span>
  </div>
</div>

<div class="field">
  <label>Text label gap</label>
  <div class="row">
    <input type="number" id="textGap" value="16" min="0" max="200">
    <span class="unit">px</span>
  </div>
</div>

<div class="divider"></div>

<button id="btn" onclick="tidy()">✦ Tidy Up</button>

<div id="status">Select frames or sections to begin.</div>

<script>
  function tidy() {
    const frameGap = Math.max(0, parseInt(document.getElementById('frameGap').value) || 40);
    const textGap  = Math.max(0, parseInt(document.getElementById('textGap').value)  || 16);
    document.getElementById('status').className = '';
    document.getElementById('status').textContent = 'Working…';
    parent.postMessage({ pluginMessage: { type: 'tidy', frameGap, textGap } }, '*');
  }

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg || msg.type !== 'status') return;
    const el = document.getElementById('status');
    el.textContent = msg.text;
    el.className   = msg.ok ? 'ok' : 'err';
  };

  // Enter key triggers tidy
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') tidy();
  });
</script>
</body>
</html>
